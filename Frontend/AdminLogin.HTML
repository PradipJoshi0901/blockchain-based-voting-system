<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Biometric Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 35px 45px;
            border-radius: 12px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
            text-align: center;
            width: 320px;
        }
        h2 {
            margin-bottom: 10px;
            font-size: 22px;
            color: #333;
        }
        p {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }
        .biometric-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #27ae60;
            color: #fff;
            transition: background 0.3s ease, transform 0.1s ease;
        }
        .btn:hover {
            background: #1e8449;
            transform: translateY(-1px);
        }
        .note {
            margin-top: 18px;
            font-size: 12px;
            color: #888;
        }
    </style>
</head>
<body>

```
<div class="container">
    <div class="biometric-icon">🔐</div>
    <h2>Admin Login</h2>
    <p>Secure access using biometric authentication</p>

    <button class="btn" onclick="loginWithBiometrics()">
        Login with Biometrics
    </button>

    <div class="note">
        Fingerprint / Face ID verification will be required
    </div>
</div>



</body>
</html>
