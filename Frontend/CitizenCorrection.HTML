<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Citizen Management Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #f4f1ec;
  --bg2: #ede9e2;
  --surface: #ffffff;
  --surface2: #f9f7f4;
  --border: #ddd9d0;
  --border-focus: #2d5be3;
  --accent: #2d5be3;
  --accent-light: #eef2fd;
  --accent-glow: rgba(45, 91, 227, 0.15);
  --text: #1a1a2e;
  --text-muted: #8a8578;
  --text-dim: #b5b0a8;
  --success: #0f7b5a;
  --success-bg: #edfbf5;
  --error: #c0392b;
  --error-bg: #fef2f2;
  --info-bg: #eef2fd;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Playfair Display', serif;
  --body: 'Outfit', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--body);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}

.portal-wrapper {
  width: 100%;
  max-width: 540px;
  animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  padding: 28px 32px 24px;
  border-bottom: 3px solid var(--accent);
  display: flex;
  align-items: flex-start;
  gap: 18px;
}

.header-seal {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
  background: var(--accent-light);
}

.header-eyebrow {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 5px;
}

.header h1 {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.15;
}

.header p {
  margin-top: 4px;
  font-size: 12.5px;
  color: var(--text-muted);
  font-weight: 300;
}

.portal-body {
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 18px 18px;
  overflow: hidden;
}

.section { padding: 24px 32px; }
.section + .section { border-top: 1px solid var(--border); }

.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 20px;
}

.section-num {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  background: var(--accent);
  color: #fff;
  font-family: var(--mono);
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.section-title { font-size: 13px; font-weight: 600; color: var(--text); }
.section-desc  { font-size: 11px; color: var(--text-muted); margin-left: auto; font-family: var(--mono); }

.field { margin-bottom: 4px; }

.field label {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}

input {
  width: 100%;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: var(--body);
  font-size: 13.5px;
  padding: 10px 13px;
  transition: all 0.2s ease;
}

input::placeholder { color: var(--text-dim); }

input:focus {
  outline: none;
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px var(--accent-glow);
}

input[type="date"] { font-family: var(--mono); font-size: 12px; }
input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.4; cursor: pointer; }

input.invalid {
  border-color: var(--error) !important;
  background: var(--error-bg) !important;
  box-shadow: none !important;
}

input.valid {
  border-color: var(--success) !important;
}

.field-error {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--error);
  margin: 3px 2px 10px;
  min-height: 14px;
  display: block;
}

.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  font-family: var(--body);
  font-size: 13.5px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s ease;
  margin-top: 4px;
}

.btn:active { transform: scale(0.98); }

.btn-search {
  background: var(--accent-light);
  color: var(--accent);
  border: 1.5px solid rgba(45,91,227,0.25);
}

.btn-search:hover { background: #e0e8fb; border-color: var(--accent); }

.btn-update {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px rgba(45,91,227,0.3);
}

.btn-update:hover {
  background: #2450cc;
  box-shadow: 0 6px 20px rgba(45,91,227,0.4);
  transform: translateY(-1px);
}

.divider { height: 1px; background: var(--border); margin: 20px 0; }

#message {
  display: none;
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 11.5px;
  padding: 10px 14px;
  border-radius: 8px;
  text-align: center;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}

#message.success { display: block; background: var(--success-bg); border: 1px solid rgba(15,123,90,0.25); color: var(--success); }
#message.error   { display: block; background: var(--error-bg);   border: 1px solid rgba(192,57,43,0.25); color: var(--error); }
#message.info    { display: block; background: var(--info-bg);    border: 1px solid rgba(45,91,227,0.2); color: var(--accent); }

.footer-strip {
  margin-top: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.footer-strip span { font-family: var(--mono); font-size: 9px; color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase; }
.footer-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--text-dim); }
</style>
</head>

<body>
<div class="portal-wrapper">

  <div class="header">
    <div class="header-seal">🏛</div>
    <div>
      <div class="header-eyebrow">Official Registry · Secure Access</div>
      <h1>Citizen Management<br>Portal</h1>
      <p>Search and update registered citizen records</p>
    </div>
  </div>

  <div class="portal-body">

    <!-- SECTION 01: Search -->
    <div class="section">
      <div class="section-label">
        <div class="section-num">01</div>
        <div class="section-title">Lookup Citizen Record</div>
        <div class="section-desc">Required fields</div>
      </div>
      <div class="row">
        <div class="field">
          <label>Citizenship No.</label>
          <input type="text" id="searchCitizenship" placeholder="e.g. 12-34-56789"
            oninput="validateField(this, validateCitizenshipNo)"
            onblur="validateField(this, validateCitizenshipNo)">
          <span class="field-error" id="searchCitizenshipError"></span>
        </div>
        <div class="field">
          <label>NID Number</label>
          <input type="text" id="searchNID" placeholder="e.g. 12-34-56789"
            oninput="validateField(this, validateNIDNo)"
            onblur="validateField(this, validateNIDNo)">
          <span class="field-error" id="searchNIDError"></span>

        </div>
      </div>
      <button class="btn btn-search" onclick="searchCitizen()">Search Citizen</button>
    </div>

    <!-- SECTION 02: Edit -->
    <div class="section">
      <div class="section-label">
        <div class="section-num">02</div>
        <div class="section-title">Citizen Information</div>
        <div class="section-desc">Editable fields</div>
      </div>
      <div class="row">
        <div class="field">
          <label>First Name</label>
          <input type="text" id="First_Name" placeholder="First name"
            oninput="validateField(this, validateName)"
            onblur="validateField(this, validateName)">
          <span class="field-error" id="First_NameError"></span>
        </div>
        <div class="field">
          <label>Last Name</label>
          <input type="text" id="Last_Name" placeholder="Last name"
            oninput="validateField(this, validateName)"
            onblur="validateField(this, validateName)">
          <span class="field-error" id="Last_NameError"></span>
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Date of Birth</label>
          <input type="date" id="date_of_birth"
            onchange="validateField(this, validateDOB)"
            onblur="validateField(this, validateDOB)">
          <span class="field-error" id="date_of_birthError"></span>
        </div>
        <div class="field">
          <label>Gender</label>
          <input type="text" id="Gender" placeholder="Male / Female / Other"
            oninput="validateField(this, validateGender)"
            onblur="validateField(this, validateGender)">
          <span class="field-error" id="GenderError"></span>
        </div>
      </div>
      <div class="field">
        <label>Full Address</label>
        <input type="text" id="address" placeholder="Street, City, Province"
          oninput="validateField(this, validateAddress)"
          onblur="validateField(this, validateAddress)">
        <span class="field-error" id="addressError"></span>
      </div>

      <div class="divider"></div>
      <button class="btn btn-update" onclick="updateCitizen()">Update Citizen Information</button>
      <div id="message"></div>
    </div>

  </div>

  <div class="footer-strip">
    <span>Civil Registry System</span>
    <div class="footer-dot"></div>
    <span>Authorized Use Only</span>
    <div class="footer-dot"></div>
    <span>v2.0</span>
  </div>

</div>

<script>
/* ─── Validation rules ─── */

/*
  Citizenship No.
  - Required
  - 5–20 characters
  - Digits and hyphens (-) only
  - Example: 12-34-56789
*/
function validateCitizenshipNo(val) {
  val = val.trim();
  if (!val) return "Citizenship number is required.";
  if (val.length < 5 || val.length > 20) return "Must be 5–20 characters long.";
  if (!/^[\d-]+$/.test(val)) return "Only digits and hyphens (-) allowed.";
  return "";
}

/*
  NID Number
  - Required
  - 5–20 characters
  - Digits and hyphens (-) only
  - Example: 12345-00001
*/
function validateNIDNo(val) {
  val = val.trim();
  if (!val) return "NID number is required.";
  if (val.length < 5 || val.length > 20) return "Must be 5–20 characters long.";
  if (!/^[\d-]+$/.test(val)) return "Only digits and hyphens (-) allowed.";
  return "";
}

/*
  Name (First & Last — same rule)
  - Required
  - 2–80 characters
  - Letters and spaces only
  - No hyphens, apostrophes, periods, or special characters
*/
function validateName(val) {
  val = val.trim();
  if (!val) return "This field is required.";
  if (val.length < 2)  return "Must be at least 2 characters.";
  if (val.length > 80) return "Cannot exceed 80 characters.";
  if (!/^[a-zA-Z\s]+$/.test(val)) return "Only letters and spaces allowed. No hyphens, apostrophes, or periods.";
  return "";
}

/*
  Date of Birth
  - Required
  - Must be a valid past date
  - Age must be realistic (≤ 150 years)
*/
function validateDOB(val) {
  if (!val) return "Date of birth is required.";
  const dob   = new Date(val);
  const today = new Date();
  if (isNaN(dob.getTime())) return "Enter a valid date.";
  if (dob >= today) return "Date of birth must be in the past.";
  const age = Math.floor((today - dob) / (365.25 * 24 * 60 * 60 * 1000));
  if (age > 150) return "Enter a realistic date of birth.";
  return "";
}

/*
  Gender
  - Required
  - Must be Male, Female, or Other (case-insensitive)
*/
function validateGender(val) {
  val = val.trim();
  if (!val) return "Gender is required.";
  if (!["male", "female", "other"].includes(val.toLowerCase())) return "Enter Male, Female, or Other.";
  return "";
}

/*
  Address
  - Required
  - 5–200 characters
*/
function validateAddress(val) {
  val = val.trim();
  if (!val) return "Address is required.";
  if (val.length < 5)   return "Address is too short (min 5 characters).";
  if (val.length > 200) return "Address is too long (max 200 characters).";
  return "";
}

/* ─── Field-level helper ─── */

function validateField(input, ruleFn) {
  const errorId = input.id + "Error";
  const errorEl = document.getElementById(errorId);
  const msg = ruleFn(input.value);

  input.classList.toggle("invalid", !!msg);
  input.classList.toggle("valid",   !msg && input.value.trim() !== "");

  if (errorEl) errorEl.textContent = msg;
  return !msg;
}

/* ─── Full-form validation for Update ─── */

function validateUpdateForm() {
  const fields = [
    { id: "First_Name",    fn: validateName    },
    { id: "Last_Name",     fn: validateName    },
    { id: "date_of_birth", fn: validateDOB     },
    { id: "Gender",        fn: validateGender  },
    { id: "address",       fn: validateAddress },
  ];
  let allValid = true;
  for (const { id, fn } of fields) {
    if (!validateField(document.getElementById(id), fn)) allValid = false;
  }
  return allValid;
}

/* ─── Message helper ─── */

function showMessage(text, type = 'info') {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = type;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = '';
  if (type === 'success') setTimeout(() => { el.style.display = 'none'; }, 4000);
}

/* ─── Search ─── */

async function searchCitizen() {
  const citizenshipInput = document.getElementById('searchCitizenship');
  const nidInput         = document.getElementById('searchNID');

  const v1 = validateField(citizenshipInput, validateCitizenshipNo);
  const v2 = validateField(nidInput, validateNIDNo);
  if (!v1 || !v2) return;

  try {
    const citizenship_number = citizenshipInput.value.trim();
    const NID_number         = nidInput.value.trim();

    const response = await fetch(
      `/api/citizen?citizenship_number=${encodeURIComponent(citizenship_number)}&NID_number=${encodeURIComponent(NID_number)}`,
      { method: 'GET' }
    );

    const result = await response.json();

    if (!response.ok) {
      showMessage(result.error || 'Citizen not found', 'error');
      return;
    }

    const dob = result.date_of_birth ? result.date_of_birth.substring(0, 10) : '';

    const fieldMap = {
      First_Name:    result.First_Name    || '',
      Last_Name:     result.Last_Name     || '',
      date_of_birth: dob,
      Gender:        result.Gender        || '',
      address:       result.address       || '',
    };

    for (const [id, val] of Object.entries(fieldMap)) {
      const el = document.getElementById(id);
      el.value = val;
      el.classList.remove('invalid', 'valid');
      const errEl = document.getElementById(id + 'Error');
      if (errEl) errEl.textContent = '';
    }

    citizenshipInput.dataset.originalCitizenship = result.citizenship_number || citizenship_number;
    nidInput.dataset.originalNID                 = result.NID_number          || NID_number;

    showMessage('Citizen data loaded. You can edit and update.', 'info');
  } catch (err) {
    showMessage('Search failed: ' + err.message, 'error');
  }
}

/* ─── Update ─── */

async function updateCitizen() {
  const searchCitizenshipInput = document.getElementById('searchCitizenship');
  const searchNIDInput         = document.getElementById('searchNID');

  const citizenshipNum = searchCitizenshipInput.dataset.originalCitizenship || searchCitizenshipInput.value.trim();
  const nidNum         = searchNIDInput.dataset.originalNID                 || searchNIDInput.value.trim();

  if (!citizenshipNum || !nidNum) {
    showMessage('Please search for a citizen first before updating.', 'error');
    return;
  }

  if (!validateUpdateForm()) {
    showMessage('Please fix the errors above before updating.', 'error');
    return;
  }

  try {
    const data = {
      citizenship_number: citizenshipNum,
      NID_number:         nidNum,
      First_Name:         document.getElementById('First_Name').value.trim(),
      Last_Name:          document.getElementById('Last_Name').value.trim(),
      date_of_birth:      document.getElementById('date_of_birth').value,
      Gender:             document.getElementById('Gender').value.trim(),
      address:            document.getElementById('address').value.trim()
    };

    const response = await fetch('/api/updatecitizen', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    const result = await response.json();
    showMessage(result.message || result.error, response.ok ? 'success' : 'error');
  } catch (err) {
    showMessage('Update failed: ' + err.message, 'error');
  }
}
</script>
</body>
</html>
