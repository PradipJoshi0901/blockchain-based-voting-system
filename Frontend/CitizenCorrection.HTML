<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Citizen Management Portal</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Tahoma, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: #eef3ff;
  display: flex;
  justify-content: center;
  align-items: center;
}

.portal {
  background: #fff;
  width: 420px;
  border-radius: 14px;
  box-shadow: 0 18px 40px rgba(0,0,0,0.12);
  overflow: hidden;
}

.header {
  background: linear-gradient(135deg, #3b5bfd, #4f46e5);
  color: #fff;
  padding: 18px;
  text-align: center;
}

.header h2 {
  margin: 0;
  font-size: 20px;
}

.header p {
  margin: 4px 0 0;
  font-size: 12px;
  opacity: 0.9;
}


.section {
  padding: 18px;
  border-bottom: 1px solid #eee;
}

.section:last-child {
  border-bottom: none;
}

.section-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 12px;
  color: #333;
}


input {
  width: 100%;
  padding: 10px;
  margin-bottom: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

input:focus {
  outline: none;
  border-color: #4f46e5;
}


.row {
  display: flex;
  gap: 10px;
}

.row input {
  flex: 1;
}


button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 14px;
  cursor: pointer;
}

.search-btn {
  background: #2563eb;
}

.search-btn:hover {
  background: #1e40af;
}

.update-btn {
  background: #22c55e;
}

.update-btn:hover {
  background: #16a34a;
}

#message {
  text-align: center;
  font-size: 13px;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="portal">

 
  <div class="header">
    <h2>Citizen Management Form</h2>
    <p>Search and Update Citizen Information</p>
  </div>

 
  <div class="section">
    <div class="section-title">🔍 Search Citizen</div>

    <input type="text" id="searchCitizenship" placeholder="Enter citizenship number" required>
    <input type="text" id="searchNID" placeholder="Enter NID number" required>

    <button class="search-btn" onclick="searchCitizen()">Search Citizen</button>
  </div>

 
  <div class="section">
    <div class="section-title">✏️ Citizen Information</div>

    <div class="row">
      <input type="text" id="First_Name" placeholder="First name">
      <input type="text" id="Last_Name" placeholder="Last name">
    </div>

    <div class="row">
      <input type="date" id="date_of_birth">
      <input type="text" id="Gender" placeholder="Gender">
    </div>

    <input type="text" id="address" placeholder="Enter full address">
    <input type="text" id="NID_number" placeholder="NID number">

    <button class="update-btn" onclick="updateCitizen()">Update Citizen Information</button>

    <p id="message"></p>
  </div>

</div>

<script>
async function searchCitizen() {
  const citizenship_number = document.getElementById('searchCitizenship').value;
  const NID_number = document.getElementById('searchNID').value;

  const response = await fetch(
    `/api/citizen?citizenship_number=${encodeURIComponent(citizenship_number)}&NID_number=${encodeURIComponent(NID_number)}`,
    { method: 'GET' }
  );

  const result = await response.json();

  if (!response.ok) {
    document.getElementById('message').innerText = result.error || 'Citizen not found';
    return;
  }

  const dob = result.date_of_birth ? result.date_of_birth.substring(0, 10) : '';

  document.getElementById('First_Name').value    = result.First_Name || '';
  document.getElementById('Last_Name').value     = result.Last_Name || '';
  document.getElementById('date_of_birth').value = dob;
  document.getElementById('Gender').value        = result.Gender || '';
  document.getElementById('address').value       = result.address || '';
  document.getElementById('NID_number').value    = result.NID_number || '';

  document.getElementById('searchCitizenship').dataset.originalCitizenship = result.citizenship_number;
  document.getElementById('searchNID').dataset.originalNID = result.original_NID_number;

  document.getElementById('message').innerText =
    'Citizen data loaded. You can edit and update.';
}

async function updateCitizen() {
  const searchCitizenshipInput = document.getElementById('searchCitizenship');
  const searchNIDInput = document.getElementById('searchNID');

  const data = {
    citizenship_number: searchCitizenshipInput.dataset.originalCitizenship || searchCitizenshipInput.value,
    original_NID_number: searchNIDInput.dataset.originalNID || searchNIDInput.value,
    First_Name: document.getElementById('First_Name').value,
    Last_Name: document.getElementById('Last_Name').value,
    date_of_birth: document.getElementById('date_of_birth').value,
    Gender: document.getElementById('Gender').value,
    address: document.getElementById('address').value,
    new_NID_number: document.getElementById('NID_number').value
  };

  const response = await fetch('/api/updatecitizen', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });

  const result = await response.json();
  document.getElementById('message').innerText = result.message || result.error;
}
</script>

</body>
</html>
